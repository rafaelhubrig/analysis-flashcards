<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Analysis Flashcards</title>
    
    <!-- KaTeX Offline-Support (Pfade zu deinen lokalen Dateien) -->
    <link rel="stylesheet" href="lib/katex.min.css">
    <script defer src="lib/katex.min.js"></script>
    <script defer src="lib/contrib/auto-render.min.js"></script>

    <style>
        body { font-family: -apple-system, system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; background: #f2f2f7; margin: 0; min-height: 100vh; color: #1c1c1e; }
        #menu, #game { width: 100%; max-width: 450px; display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        h2 { margin-top: 40px; font-weight: 700; }
        
        .card { width: 100%; height: 55vh; background: white; border-radius: 25px; margin: 20px 0; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); cursor: pointer; overflow-y: auto; font-size: 1.15rem; line-height: 1.6; display: flex; flex-direction: column; box-sizing: border-box; transition: transform 0.1s; }
        .card:active { transform: scale(0.98); }

        .controls { display: flex; gap: 12px; width: 100%; margin-bottom: 12px; }
        button { flex: 1; padding: 18px; font-size: 1rem; font-weight: 600; border-radius: 15px; border: none; color: white; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        
        .btn-red { background: #ff3b30; } 
        .btn-green { background: #34c759; } 
        .btn-blue { background: #007aff; }
        .btn-gray { background: #8e8e93; width: auto; align-self: flex-start; padding: 10px 20px; margin-bottom: 15px; }
        
        .deck-btn { background: white; color: #007aff; border: 1.5px solid #007aff; margin-bottom: 12px; width: 100%; text-align: left; padding-left: 20px; }
        .deck-btn:active { background: #f2f2f7; }

        #status { font-size: 0.85rem; color: #8e8e93; font-weight: 500; margin-bottom: 5px; }
        #loader { font-size: 0.9rem; color: #007aff; margin: 20px; }
    </style>
</head>
<body>

    <!-- MENÜ ANSICHT -->
    <div id="menu">
        <h2>Mathe Flashcards</h2>
        <div id="loader">Decks werden geladen...</div>
        <div id="deck-list" style="width: 100%;"></div>
    </div>

    <!-- SPIEL ANSICHT -->
    <div id="game" style="display: none;">
        <button class="btn-gray" onclick="backToMenu()">⬅ Menü</button>
        <div id="status"></div>
        <div id="card" class="card"></div>
        <div class="controls">
            <button class="btn-red" onclick="markCard(false)">❌ Falsch</button>
            <button class="btn-green" onclick="markCard(true)">✅ Richtig</button>
        </div>
        <button class="btn-blue" id="filterBtn" onclick="toggleReviewMode()" style="width:100%">Nur Falsche üben</button>
    </div>

    <script>
        let allCards = [];
        let currentQueue = [];
        let index = 0, showAnswer = false, reviewMode = false, currentDeckId = "";

        // 1. Decks via GitHub API suchen + Offline Cache
        async function loadMenu() {
    const list = document.getElementById('deck-list');
    const loader = document.getElementById('loader');
    
    const cachedDecks = JSON.parse(localStorage.getItem('deck_list_cache'));
    if (cachedDecks) { renderDeckButtons(cachedDecks); loader.style.display = "none"; }

    try {
        // Wir fragen GitHub nach dem Inhalt des Hauptverzeichnisses
        const response = await fetch('https://api.github.com', {
            headers: { 'Accept': 'application/vnd.github.v3+json' }
        });

        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.message || 'API Limit');
        }
        
        const files = await response.json();
        const decks = files
            .filter(f => f.name.startsWith('cards_') && f.name.endsWith('.js'))
            .map(f => f.name.replace('.js', ''));

        if (decks.length > 0) {
            localStorage.setItem('deck_list_cache', JSON.stringify(decks));
            renderDeckButtons(decks);
            loader.style.display = "none";
        } else {
            loader.innerText = "Keine Dateien mit 'cards_' gefunden.";
        }
    } catch (e) {
        console.error("API Fehler:", e);
        // Zeige den spezifischen Fehler im Loader an
        loader.innerText = e.message.includes('rate limit') 
            ? "Limit erreicht. Bitte in 1 Std. probieren oder Cache nutzen." 
            : "Verbindung fehlgeschlagen (API).";
    }
}

        function renderDeckButtons(decks) {
            const list = document.getElementById('deck-list');
            list.innerHTML = "";
            decks.forEach(id => {
                const btn = document.createElement('button');
                btn.className = "deck-btn";
                // Name verschönern: cards_1_test -> 1 TEST
                btn.innerText = id.replace('cards_', '').replace(/_/g, ' ').toUpperCase();
                btn.onclick = () => selectDeck(id);
                list.appendChild(btn);
            });
        }

        // 2. Deck dynamisch laden
        function selectDeck(id) {
            currentDeckId = id;
            const script = document.createElement('script');
            script.src = `${id}.js`;
            script.onload = () => {
                const rawData = window[id]; // Sucht Variable mit Namen des Decks
                const savedData = JSON.parse(localStorage.getItem('flash_' + id));
                allCards = savedData || rawData;
                
                document.getElementById('menu').style.display = 'none';
                document.getElementById('game').style.display = 'flex';
                currentQueue = [...allCards];
                index = 0; showAnswer = false; render();
            };
            document.head.appendChild(script);
        }

        function render() {
            const cardEl = document.getElementById('card');
            const statusEl = document.getElementById('status');
            if (currentQueue.length === 0) {
                cardEl.innerHTML = "<center><br>Alle Karten für heute erledigt! 🎉</center>";
                return;
            }
            const card = currentQueue[index];
            cardEl.innerHTML = showAnswer ? card.a : card.q;
            statusEl.innerText = (reviewMode ? "MODUS: WIEDERHOLUNG" : "MODUS: ALLE") + ` (${index + 1}/${currentQueue.length})`;

            if (window.renderMathInElement) {
                renderMathInElement(cardEl, {
                    delimiters: [
                        {left: "$$", right: "$$", display: true},
                        {left: "$", right: "$", display: false}
                    ],
                    throwOnError: false
                });
            }
        }

        function markCard(correct) {
            if (currentQueue.length === 0) return;
            const cardQ = currentQueue[index].q;
            const cardInAll = allCards.find(c => c.q === cardQ);
            if(cardInAll) cardInAll.needsReview = !correct;
            
            localStorage.setItem('flash_' + currentDeckId, JSON.stringify(allCards));
            nextCard();
        }

        function toggleReviewMode() {
            reviewMode = !reviewMode;
            document.getElementById('filterBtn').innerText = reviewMode ? "Alle Karten anzeigen" : "Nur Falsche üben";
            currentQueue = reviewMode ? allCards.filter(c => c.needsReview) : [...allCards];
            index = 0; showAnswer = false; render();
        }

        function nextCard() {
            if (currentQueue.length > 1) {
                index = (index + 1) % currentQueue.length;
            } else {
                index = 0;
            }
            showAnswer = false; 
            render();
        }

        function backToMenu() {
            document.getElementById('menu').style.display = 'flex';
            document.getElementById('game').style.display = 'none';
            loadMenu(); // Liste aktualisieren
        }

        document.getElementById('card').onclick = () => { showAnswer = !showAnswer; render(); };
        
        // PWA Service Worker registrieren
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        window.onload = loadMenu;
    </script>
</body>
</html>
